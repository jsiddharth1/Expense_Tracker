services:
  # --- MySQL Database Service ---
  - type: web
    name: expense-tracker-db
    runtime: docker
    envVars:
      - key: MYSQL_DATABASE
        value: expense_db
      - key: MYSQL_ROOT_PASSWORD
        value: root
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1

  # --- Spring Boot App Service ---
  - type: web
    name: expense-tracker-app
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        value: jdbc:mysql://expense-tracker-db:3306/expense_db
      - key: DATABASE_USERNAME
        value: root
      - key: DATABASE_PASSWORD
        value: root
      - key: DATABASE_DRIVER
        value: com.mysql.cj.jdbc.Driver
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8081
    # Note: Render will detect the Dockerfile in the root automatically
