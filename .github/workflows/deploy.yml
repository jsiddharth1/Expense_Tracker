name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # --- Build Frontend --- 
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: expense-tracker-frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: npm ci
      working-directory: expense-tracker-frontend

    - name: Build Frontend
      run: npm run build
      working-directory: expense-tracker-frontend
      env:
        CI: false # Treat warnings as warnings, not errors

    # --- Build Backend ---
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build Backend with Maven
      run: ./mvnw clean package -DskipTests
      working-directory: expense-tracker

    # --- Upload Artifact ---
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: expense-tracker-jar
        path: expense-tracker/target/*.jar
