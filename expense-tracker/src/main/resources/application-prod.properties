# Production Database Config (using ENVIRONMENT VARIABLES)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/expense_db}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Port
server.port=${PORT:8081}

# Static Resources
spring.web.resources.static-locations=classpath:/static/
